apiVersion: apps/v1
kind: Deployment
metadata:
  name: tabularium-api
  namespace: tabularium-dev
  labels:
    app: tabularium-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tabularium-api
  template:
    metadata:
      labels:
        app: tabularium-api
    spec:
      containers:
        - name: api
          image: tabularium-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: tabularium-env
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: tabularium-api
  namespace: tabularium-dev
  labels:
    app: tabularium-api
spec:
  selector:
    app: tabularium-api
  ports:
    - name: http
      port: 3000
      targetPort: http
