apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tabularium-api-data
  namespace: tabularium-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tabularium-api
  namespace: tabularium-dev
  labels:
    app: tabularium-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tabularium-api
  template:
    metadata:
      labels:
        app: tabularium-api
    spec:
      containers:
        - name: api
          image: tabularium-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: tabularium-env
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tabularium-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: tabularium-api
  namespace: tabularium-dev
  labels:
    app: tabularium-api
spec:
  selector:
    app: tabularium-api
  ports:
    - name: http
      port: 3000
      targetPort: http
