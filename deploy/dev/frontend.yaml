apiVersion: apps/v1
kind: Deployment
metadata:
  name: tabularium-frontend
  namespace: tabularium-dev
  labels:
    app: tabularium-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tabularium-frontend
  template:
    metadata:
      labels:
        app: tabularium-frontend
    spec:
      containers:
        - name: frontend
          image: tabularium-frontend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5180
              name: http
          envFrom:
            - secretRef:
                name: tabularium-env
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: tabularium-frontend
  namespace: tabularium-dev
  labels:
    app: tabularium-frontend
spec:
  selector:
    app: tabularium-frontend
  ports:
    - name: http
      port: 5180
      targetPort: http
