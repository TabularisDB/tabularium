apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: tabularis-registry
  labels:
    app: tabularis-registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tabularis-registry
  template:
    metadata:
      labels:
        app: tabularis-registry
    spec:
      containers:
        - name: registry
          image: tabularis-registry:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: registry-env
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL
              value: /data/registry.db
            - name: BASE_URL
              value: https://registry.spitzli.dev
            - name: WEB_BASE_URL
              value: https://registry.spitzli.dev
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /openapi/json
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /openapi/json
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
