apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: tabularis-registry
  labels:
    app: tabularis-registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tabularis-registry
  template:
    metadata:
      labels:
        app: tabularis-registry
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: registry
          image: codeberg.org/tabularium/tabularium:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: registry-env
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL
              value: /data/registry.db
            - name: DATA_DIR
              value: /data
            - name: BASE_URL
              value: https://registry.spitzli.dev
            - name: WEB_BASE_URL
              value: https://registry.spitzli.dev
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
        - name: tmp
          emptyDir: {}
