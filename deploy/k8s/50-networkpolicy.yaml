apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry-default-deny
  namespace: tabularis-registry
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry-allow-traefik
  namespace: tabularis-registry
spec:
  podSelector:
    matchLabels:
      app: tabularis-registry
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 3000
