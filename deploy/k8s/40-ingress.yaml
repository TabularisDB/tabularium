apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry
  namespace: tabularis-registry
  annotations:
    # Cloudflare is in front and terminates TLS for clients.
    # Origin serves HTTP and CF should be in "Flexible" mode (or "Full" if
    # you uncomment the TLS section below + cert-manager annotation).
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: registry.spitzli.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: registry
                port:
                  number: 80
  # --- Enable below for Cloudflare "Full (strict)" mode with origin cert ---
  # tls:
  #   - hosts:
  #       - registry.spitzli.dev
  #     secretName: registry-tls
  # And add this annotation under metadata.annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt
  #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
  #   traefik.ingress.kubernetes.io/router.tls: "true"
