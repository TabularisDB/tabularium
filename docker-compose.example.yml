# Minimal Tabularium deployment.
#
# Quickstart:
#   1. mkdir -p ./tabularium-data
#   2. Create a .env next to this file with at minimum:
#        JWT_SECRET=$(openssl rand -hex 32)
#        TOKEN_ENC_KEY=$(openssl rand -hex 32)
#        BASE_URL=https://your.public.url
#   3. docker compose up -d
#   4. tail ./tabularium-data/bootstrap-password — that's your one-time admin password.
#
# All persistent state (SQLite DB, uploads, config.json, bootstrap-password) lives
# in ./tabularium-data on the host. Back that folder up. Don't commit it.

services:
  registry:
    image: codeberg.org/tabularium/tabularium:latest
    container_name: tabularium
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — run: openssl rand -hex 32}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:?TOKEN_ENC_KEY is required — run: openssl rand -hex 32}

      BASE_URL: ${BASE_URL:-http://localhost:3000}

      # SQLite (default). For other dialects, replace with one of:
      #   DATABASE_URL: "postgres://user:pass@host:5432/db"
      #   DATABASE_URL: "mysql://user:pass@host:3306/db"
      DATABASE_URL: "/data/registry.db"
      DATA_DIR: "/data"

      CACHE_DRIVER: "memory"
    volumes:
      - ./tabularium-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
