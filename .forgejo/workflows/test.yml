# Run bun:test across all workspaces that have a test script.

name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build @tabularium/manifest dist
        run: bun --cwd packages/manifest run build

      - name: Run tests
        run: bun run test
