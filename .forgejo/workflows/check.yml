# Type-check: frontend (svelte-check) and api (tsc --noEmit) run in parallel.
#
# bun is bootstrapped per-job because the lyna runner executes jobs in an
# ephemeral container (node:lts) that doesn't have bun preinstalled.

name: Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq unzip ca-certificates
            curl -fsSL https://bun.sh/install | bash
          fi
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build @tabularium/manifest dist
        run: bun --cwd packages/manifest run build

      - name: Svelte-check
        working-directory: apps/frontend
        run: bun run check

  api:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq unzip ca-certificates
            curl -fsSL https://bun.sh/install | bash
          fi
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build @tabularium/manifest dist
        run: bun --cwd packages/manifest run build

      - name: Tsc --noEmit
        working-directory: apps/api
        run: bun run check

  rust-client:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure rust toolchain (latest stable)
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default stable
          rustup update stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          cargo --version

      - name: Cargo check
        working-directory: packages/tabularium-rs
        run: cargo check --all-targets
