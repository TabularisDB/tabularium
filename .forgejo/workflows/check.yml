# Type-check: frontend (svelte-check) and api (tsc --noEmit) run in parallel.
#
# Runs on lyna in host mode — see .forgejo/workflows/test.yml for the reason
# we don't use `runs-on: docker`.

name: Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Svelte-check
        working-directory: apps/frontend
        run: bun run check

  api:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Tsc --noEmit
        working-directory: apps/api
        run: bun run check

  rust-client:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure rust toolchain (latest stable)
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default stable
          rustup update stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          cargo --version

      - name: Cargo check
        working-directory: packages/tabularium-rs
        run: cargo check --all-targets
