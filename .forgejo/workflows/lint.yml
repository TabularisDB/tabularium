# Lint + format check via Biome (.ts/.js/.json) and Prettier (.svelte).
# Auto-fix locally with `bun run format`.

name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq unzip ca-certificates
            curl -fsSL https://bun.sh/install | bash
          fi
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
