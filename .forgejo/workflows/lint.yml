# Lint + format check via Biome (.ts/.js/.json) and Prettier (.svelte).
# Auto-fix locally with `bun run format`.

name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build @tabularium/manifest dist
        run: cd packages/manifest && bun run build

      - name: Lint
        run: bun run lint
