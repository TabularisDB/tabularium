# Build and push the Tabularium container image to Codeberg's container
# registry. Runs directly on the lyna host (runs-on: lyna) so it can use
# the host's docker daemon — drops the buildah/trivy apt-install boilerplate
# we needed on Codeberg's shared runners.
#
# Trivy CVE scan still runs as a container; image push uses the docker CLI
# against Codeberg's registry.
#
# Secrets:
#   PACKAGE_TOKEN — a Codeberg access token with `write:package` scope.

name: Build Docker image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup docker CLI
        # Runner job container (node:lts) has no docker CLI. Install on demand;
        # the host's docker socket is mounted via runner config (docker_host: "").
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq docker.io
          fi
          docker --version

      - name: Resolve image + tag
        id: meta
        run: |
          set -eu
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="codeberg.org/$OWNER/tabularium"
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev-${GITHUB_SHA:0:7}"
          fi
          echo "image=${IMAGE}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}"  >> "$GITHUB_OUTPUT"

      - name: Log in to Codeberg Container Registry
        # Username must match the PACKAGE_TOKEN's owner. Hardcode NewtTheWolf
        # — Forgejo Actions doesn't reliably populate `github.actor` for tag
        # pushes (and `github.repository_owner` is the org, not a user). The
        # token belongs to NewtTheWolf who has write:package on the
        # Tabularium org so this works for any tag pushed by any maintainer.
        run: |
          set -eu
          {
            echo "## Registry login diagnostics"
            echo '```'
            echo "github.actor:            ${{ github.actor }}"
            echo "github.repository_owner: ${{ github.repository_owner }}"
            echo "github.ref:              ${{ github.ref }}"
            echo "docker version: $(docker --version 2>&1 | head -1)"
            echo "PACKAGE_TOKEN present:   $([ -n "${{ secrets.PACKAGE_TOKEN }}" ] && echo yes || echo no)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Print token *length* (not the value) so we can tell whether the
          # secret is empty / truncated / has trailing whitespace without
          # leaking it. Forgejo masks the literal secret in logs but a
          # numeric length slips through.
          T="${{ secrets.PACKAGE_TOKEN }}"
          echo "PACKAGE_TOKEN length: ${#T}"
          printf 'first/last char codepoints: %d / %d\n' "'${T:0:1}" "'${T: -1}"
          set +e
          printf '%s' "${T}" | docker login codeberg.org -u NewtTheWolf --password-stdin 2>&1
          rc=$?
          exit "$rc"

      - name: Build image
        run: |
          docker build \
            -f Dockerfile \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}" \
            --build-arg VERSION="${{ steps.meta.outputs.version }}" \
            --build-arg REVISION="${{ steps.meta.outputs.sha }}" \
            --build-arg CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Scan image for HIGH/CRITICAL CVEs
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/.trivy-cache:/root/.cache/" \
            aquasec/trivy:latest image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              --no-progress \
              "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}"

      - name: Logout
        if: always()
        run: docker logout codeberg.org || true
