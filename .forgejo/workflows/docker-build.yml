# Build and push the Tabularium container image to Codeberg's container registry.
#
# Uses Buildah (rootless, daemonless) so we don't need a docker socket on the
# runner. Runs on Codeberg's shared `codeberg-small` runner.
#
# Secrets:
#   PACKAGE_TOKEN — a Codeberg access token with `write:package` scope.

name: Build Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  STORAGE_DRIVER: vfs
  BUILDAH_FORMAT: docker
  BUILDAH_ISOLATION: chroot

jobs:
  build:
    runs-on: codeberg-small
    container:
      image: quay.io/buildah/stable:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Codeberg Container Registry
        run: |
          buildah login \
            --username "${{ github.repository_owner }}" \
            --password "${{ secrets.PACKAGE_TOKEN }}" \
            codeberg.org

      - name: Build image
        run: |
          set -eu
          IMAGE="codeberg.org/${{ github.repository_owner }}/tabularium"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          buildah build \
            -f Dockerfile \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ github.sha }}" \
            .

      - name: Push image
        run: |
          IMAGE="codeberg.org/${{ github.repository_owner }}/tabularium"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          buildah push "$IMAGE:$VERSION"
          buildah push "$IMAGE:latest"
          buildah push "$IMAGE:${{ github.sha }}"
