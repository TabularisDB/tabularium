# Build and push the Tabularium container image to Codeberg's container registry.
#
# Buildah (rootless, daemonless) on a Node-capable base — Forgejo's
# actions/checkout requires Node inside the container. Runs on Codeberg's
# shared `codeberg-small` runner.
#
# Secrets:
#   PACKAGE_TOKEN — a Codeberg access token with `write:package` scope.

name: Build Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  STORAGE_DRIVER: vfs
  BUILDAH_FORMAT: docker
  BUILDAH_ISOLATION: chroot

jobs:
  build:
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    runs-on: codeberg-medium
    container:
      image: node:24-bookworm-slim
    steps:
      - name: Install buildah + trivy
        run: |
          apt-get update
          apt-get install -y --no-install-recommends buildah ca-certificates curl gnupg
          curl -sSL https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb bookworm main" > /etc/apt/sources.list.d/trivy.list
          apt-get update && apt-get install -y --no-install-recommends trivy
          rm -rf /var/lib/apt/lists/*

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Codeberg Container Registry
        run: |
          buildah login \
            --username "${{ github.repository_owner }}" \
            --password "${{ secrets.PACKAGE_TOKEN }}" \
            codeberg.org

      - name: Build image
        run: |
          set -eu
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="codeberg.org/$OWNER/tabularium"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          buildah build \
            -f Dockerfile \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ github.sha }}" \
            .

      - name: Scan image for HIGH/CRITICAL CVEs
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="codeberg.org/$OWNER/tabularium"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            "$IMAGE:$VERSION"

      - name: Push image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="codeberg.org/$OWNER/tabularium"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          buildah push "$IMAGE:$VERSION"
          buildah push "$IMAGE:latest"
          buildah push "$IMAGE:${{ github.sha }}"
