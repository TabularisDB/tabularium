# Build and push the Tabularium container image to Codeberg's container registry.
#
# Uses Kaniko (rootless) so we don't need a docker socket on the runner.
# Runs on Codeberg's own `codeberg-small` runner — bring-your-own-runner with
# a `docker` label is no longer required.
#
# Secrets:
#   PACKAGE_TOKEN — a Codeberg access token with `write:package` scope.

name: Build Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: codeberg-small
    container:
      image: gcr.io/kaniko-project/executor:debug
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure registry auth
        run: |
          mkdir -p /kaniko/.docker
          AUTH=$(printf '%s:%s' "${{ github.repository_owner }}" "${{ secrets.PACKAGE_TOKEN }}" | base64 | tr -d '\n')
          cat > /kaniko/.docker/config.json <<EOF
          {"auths":{"codeberg.org":{"auth":"$AUTH"}}}
          EOF

      - name: Build and push image
        run: |
          set -eu
          IMAGE="codeberg.org/${{ github.repository_owner }}/tabularium"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          /kaniko/executor \
            --context "$GITHUB_WORKSPACE" \
            --dockerfile Dockerfile \
            --destination "$IMAGE:$VERSION" \
            --destination "$IMAGE:latest" \
            --destination "$IMAGE:${{ github.sha }}"
