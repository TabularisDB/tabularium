# Vite production build for the frontend — catches build-time errors that
# svelte-check doesn't see (asset resolution, CSS bundling, route generation).
# API has no build step (Bun runs TS directly), so this is frontend-only.

name: Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build @tabularium/manifest dist
        run: cd packages/manifest && bun run build

      - name: Vite build
        working-directory: apps/frontend
        run: bun run build
