# Vite production build for the frontend — catches build-time errors that
# svelte-check doesn't see (asset resolution, CSS bundling, route generation).
# API has no build step (Bun runs TS directly), so this is frontend-only.

name: Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: lyna
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq unzip ca-certificates
            curl -fsSL https://bun.sh/install | bash
          fi
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Vite build
        working-directory: apps/frontend
        run: bun run build
