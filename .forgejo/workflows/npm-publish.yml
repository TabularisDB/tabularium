# Publish a @tabularium/* package to npm.
#
# Triggers on tags shaped `<package>-v<semver>` so the two publishable packages
# can release independently:
#
#   manifest-v0.1.0  → publishes packages/manifest
#   cli-v0.1.0       → publishes packages/cli
#
# Also supports workflow_dispatch with an explicit package + version for
# republishes or first-time pushes from a local tag.
#
# Secrets:
#   NPM_TOKEN — an npm automation token with publish rights on @tabularium/*.

name: npm publish

on:
  push:
    tags:
      - 'manifest-v*'
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options: [manifest, cli]
      version:
        description: 'Semver to publish (e.g. 0.1.0). Must match packages/<pkg>/package.json `version`.'
        required: true
        type: string

jobs:
  publish:
    # Host mode on lyna — the docker-in-docker container path fails to pull
    # `node:24-bookworm-slim` from docker hub on this runner (anonymous pull
    # rate limit). lyna already has bun + git pre-installed, same as test.yml.
    runs-on: lyna
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package + expected version
        id: pkg
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKG="${{ inputs.package }}"
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"        # e.g. manifest-v0.1.0
            PKG="${TAG%%-v*}"                   # manifest
            VERSION="${TAG#${PKG}-v}"           # 0.1.0
          fi
          DIR="packages/${PKG}"
          if [ ! -f "${DIR}/package.json" ]; then
            echo "::error::${DIR}/package.json not found"; exit 1
          fi
          PKG_VERSION=$(bun -e "console.log(require('./${DIR}/package.json').version)")
          if [ "${PKG_VERSION}" != "${VERSION}" ]; then
            echo "::error::Tag version (${VERSION}) does not match package.json version (${PKG_VERSION}) in ${DIR}"
            exit 1
          fi
          PKG_NAME=$(bun -e "console.log(require('./${DIR}/package.json').name)")
          echo "name=${PKG_NAME}"     >> "$GITHUB_OUTPUT"
          echo "dir=${DIR}"           >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      # Build the package + its workspace deps before tests, otherwise cli
      # tests fail with "cannot find module '@tabularium/manifest'" because
      # manifest's package.json points "main" at ./dist/index.js which a
      # fresh checkout doesn't have yet. `--filter <pkg>...` walks the
      # dependency graph so manifest gets built before cli's tests run.
      - name: Build package + workspace deps
        run: bun run build --filter "${{ steps.pkg.outputs.name }}..."

      - name: Run package tests
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: bun test

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        working-directory: ${{ steps.pkg.outputs.dir }}
        # `bun publish` resolves `workspace:*` deps to actual versions before
        # uploading — `npm publish` does not, and would ship a broken tarball
        # for @tabularium/cli which depends on @tabularium/manifest via the
        # workspace protocol.
        run: bun publish --access public

      - name: Cleanup npm auth
        if: always()
        run: rm -f ~/.npmrc
