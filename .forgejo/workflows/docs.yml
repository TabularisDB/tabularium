name: Publish docs to Codeberg Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.forgejo/workflows/docs.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: docker
    container:
      image: alpine:3.20
    steps:
      - name: Install tools
        run: apk add --no-cache git bash openssh-client

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build pages tree
        run: |
          set -euo pipefail
          rm -rf /tmp/pages
          mkdir -p /tmp/pages
          cp -r docs/. /tmp/pages/
          # Codeberg Pages serves whatever sits at the root of the `pages` branch.
          touch /tmp/pages/.nojekyll

      - name: Force-push to pages branch
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          cd /tmp/pages
          git init -q -b pages
          git config user.email "actions@tabularium.local"
          git config user.name  "tabularium-docs-bot"
          git add -A
          git commit -q -m "docs: ${{ github.sha }}"
          AUTH="${ACTOR}:${PAGES_TOKEN}"
          REMOTE="${SERVER#https://}"
          git push -q --force "https://${AUTH}@${REMOTE}/${REPO}.git" pages:pages
