<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Tabularium Docs</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
		<meta name="description" content="Self-hosted plugin registry — documentation." />
		<meta property="og:image" content="assets/banner.svg" />
		<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
		<style>
			:root {
				--theme-color: #6366f1;
			}
			.markdown-section { max-width: 880px; }
			.markdown-section h1 { font-weight: 600; }
			.cover-main > p:last-child a:first-child { background: var(--theme-color); border-color: var(--theme-color); }
			.app-name-link { font-weight: 600; }
		</style>
	</head>
	<body>
		<div id="app">Loading…</div>
		<script>
			window.$docsify = {
				name: 'Tabularium',
				repo: '',
				loadSidebar: true,
				loadNavbar: true,
				coverpage: true,
				onlyCover: false,
				auto2top: true,
				maxLevel: 3,
				subMaxLevel: 2,
				search: {
					maxAge: 86400000,
					placeholder: 'Search docs…',
					noData: 'No results.',
					depth: 4,
				},
				alias: {
					'/.*/_sidebar.md': '/_sidebar.md',
					'/.*/_navbar.md': '/_navbar.md',
				},
				fallbackLanguages: ['de', 'es', 'fr', 'it', 'zh-CN'],
			}
		</script>
		<script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
		<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
		<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
	</body>
</html>
